<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1B1E24; --surface:#242932; --surface-alt:#2C323C; --line:#3A4150;
    --text:#EDEFF2; --text-muted:#8B93A1; --amber:#E8A23D;
    --blue:#4C8BC9; --green:#4C9A6A; --red:#C8383A; --purple:#9B7FD4;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:20px 16px 60px;}
  .wrap{max-width:640px;margin:0 auto;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
  .title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:28px;letter-spacing:0.5px;text-transform:uppercase;}
  .stat{text-align:right;}
  .stat-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);}
  .stat-value{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;}

  .tabbar{display:flex;gap:0;margin-bottom:18px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:4px;}
  .tabbtn{flex:1;text-align:center;padding:10px;border-radius:7px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:15px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);}
  .tabbtn.active{background:var(--amber);color:#15171B;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px 16px;margin-bottom:16px;}
  .card-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}

  .day-nav{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .day-nav button.arrow{background:var(--surface-alt);border:1px solid var(--line);color:var(--text);width:32px;height:32px;border-radius:7px;cursor:pointer;font-size:16px;}
  .day-nav input[type=date]{background:var(--surface-alt);border:1px solid var(--line);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;border-radius:7px;padding:7px 8px;flex:1;}
  .day-nav .today-jump{background:var(--amber);color:#15171B;border:none;border-radius:7px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:0.5px;}
  .day-nav-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;}

  select, .num-input{
    background:var(--surface-alt);border:1px solid var(--line);color:var(--text);
    font-family:'IBM Plex Mono',monospace;font-size:14px;border-radius:7px;padding:8px 10px;width:100%;
  }
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
  .field label{display:block;font-size:10px;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px;}

  .btn{background:var(--amber);color:#15171B;border:none;border-radius:8px;padding:11px;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:15px;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;width:100%;margin-top:14px;}
  .btn.secondary{background:var(--surface-alt);color:var(--text);border:1px solid var(--line);}
  .btn.small{width:auto;padding:8px 14px;font-size:13px;margin-top:0;}
  .btn-row{display:flex;gap:8px;margin-top:14px;}
  .btn-row .btn{margin-top:0;}

  .summary-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .summary-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;text-transform:uppercase;}
  .summary-sub{font-size:13px;color:var(--text-muted);margin-top:4px;line-height:1.5;}
  .badge{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap;}
  .badge.planned{background:rgba(76,139,201,0.18);color:var(--blue);border:1px solid rgba(76,139,201,0.4);}
  .badge.complete{background:rgba(76,154,106,0.18);color:var(--green);border:1px solid rgba(76,154,106,0.4);}

  .metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .metrics-grid .field{margin-bottom:0;}

  .chart-card svg{width:100%;height:130px;display:block;}
  .chart-labels{display:flex;justify-content:space-between;margin-top:4px;}
  .chart-labels span{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-muted);}
  .legend{display:flex;gap:16px;margin-bottom:10px;font-size:12px;color:var(--text-muted);}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .stat-mini{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text-muted);margin-bottom:10px;}
  .stat-mini b{color:var(--text);}
  .empty-note{font-size:12.5px;color:var(--text-muted);text-align:center;padding:20px 0;}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="title">Training Log</div>
    <div class="stat"><div class="stat-label">Streak</div><div class="stat-value" id="streakVal">0</div></div>
  </div>

  <div class="tabbar">
    <div class="tabbtn active" id="tabTrackBtn">Track</div>
    <div class="tabbtn" id="tabProgressBtn">Progress</div>
  </div>

  <div id="trackTab">
    <div class="card">
      <div class="day-nav">
        <button class="arrow" id="navPrev">‹</button>
        <input type="date" id="navDate">
        <button class="arrow" id="navNext">›</button>
        <button class="today-jump" id="navToday" style="display:none;">Today</button>
      </div>
      <div class="day-nav-label" id="dayNavLabel"></div>
    </div>

    <div class="card" id="activityCard"></div>

    <div class="card">
      <div class="card-title">Daily metrics</div>
      <div class="metrics-grid">
        <div class="field"><label>Calories eaten</label><input type="number" class="num-input" id="m_eaten" step="10"></div>
        <div class="field"><label>Calories burned</label><input type="number" class="num-input" id="m_burned" step="10"></div>
        <div class="field"><label>Steps</label><input type="number" class="num-input" id="m_steps" step="100"></div>
        <div class="field"><label>Sleep score</label><input type="number" class="num-input" id="m_sleepscore" step="1" min="0" max="100"></div>
        <div class="field"><label>Sleep duration (hrs)</label><input type="number" class="num-input" id="m_sleepdur" step="0.1"></div>
        <div class="field"><label>Weight (kg)</label><input type="number" class="num-input" id="m_weight" step="0.1"></div>
      </div>
    </div>
  </div>

  <div id="progressTab" style="display:none;">
    <div class="card chart-card">
      <div class="card-title">Calories in vs. burned</div>
      <div class="legend">
        <span><i style="background:var(--blue);"></i>Eaten</span>
        <span><i style="background:var(--red);"></i>Burned</span>
      </div>
      <div class="stat-mini" id="calNetStat"></div>
      <svg viewBox="0 0 700 130" id="calChart"></svg>
      <div class="chart-labels" id="calChartLabels"></div>
    </div>

    <div class="card chart-card">
      <div class="card-title">Weight (kg)</div>
      <div class="stat-mini" id="weightStat"></div>
      <svg viewBox="0 0 700 130" id="weightChart"></svg>
      <div class="chart-labels" id="weightChartLabels"></div>
    </div>

    <div class="card chart-card">
      <div class="card-title">Hours active per day</div>
      <div class="stat-mini" id="hoursStat"></div>
      <svg viewBox="0 0 700 130" id="hoursChart"></svg>
      <div class="chart-labels" id="hoursChartLabels"></div>
    </div>

    <div class="card chart-card">
      <div class="card-title">Sleep score</div>
      <svg viewBox="0 0 700 100" id="sleepScoreChart"></svg>
      <div class="chart-labels" id="sleepScoreLabels"></div>
      <div class="card-title" style="margin-top:16px;">Sleep duration (hrs)</div>
      <svg viewBox="0 0 700 100" id="sleepDurChart"></svg>
      <div class="chart-labels" id="sleepDurLabels"></div>
    </div>
  </div>

</div>

<script>
const BIKE_SUBTYPES = [
  {v:'vo2', label:'VO2max (Z5)'},
  {v:'threshold', label:'Threshold (Z4)'},
  {v:'endurance', label:'Endurance (Z2)'},
  {v:'free', label:'Free ride'},
];
const TYPE_LABELS = {bike:'Bike', swim:'Swim', run:'Run', gym:'Gym', walk:'Walk', rest:'Rest'};

function dateKey(d){ return d.toISOString().slice(0,10); }
function fmtDate(d){ return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }
function fmtShort(d){ return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
function todayNorm(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function last30Dates(){
  const arr=[]; const now=todayNorm();
  for(let i=29;i>=0;i--){ const d=new Date(now); d.setDate(d.getDate()-i); arr.push(d); }
  return arr;
}

let activities = {};
let metrics = {};
let selectedDate = todayNorm();
let currentTab = 'track';
let formState = null; // {type, subtype} while building a new entry

async function loadData(){
  try{ const a=localStorage.getItem('activities'); if(a) activities=JSON.parse(a); }catch(e){}
  try{ const m=localStorage.getItem('metrics'); if(m) metrics=JSON.parse(m); }catch(e){}
  render();
}
async function saveActivities(){ try{ localStorage.setItem('activities', JSON.stringify(activities)); }catch(e){console.error(e);} }
async function saveMetrics(){ try{ localStorage.setItem('metrics', JSON.stringify(metrics)); }catch(e){console.error(e);} }

function getMetric(dateStr){ return metrics[dateStr] || {}; }
function setMetricField(dateStr, field, value){
  if(!metrics[dateStr]) metrics[dateStr] = {};
  metrics[dateStr][field] = value;
}

// ---------- Tabs ----------
document.getElementById('tabTrackBtn').addEventListener('click', ()=>{
  currentTab='track';
  document.getElementById('tabTrackBtn').classList.add('active');
  document.getElementById('tabProgressBtn').classList.remove('active');
  document.getElementById('trackTab').style.display='';
  document.getElementById('progressTab').style.display='none';
});
document.getElementById('tabProgressBtn').addEventListener('click', ()=>{
  currentTab='progress';
  document.getElementById('tabProgressBtn').classList.add('active');
  document.getElementById('tabTrackBtn').classList.remove('active');
  document.getElementById('trackTab').style.display='none';
  document.getElementById('progressTab').style.display='';
  renderProgress();
});

// ---------- Day nav ----------
function renderDayNav(){
  const isToday = dateKey(selectedDate)===dateKey(todayNorm());
  document.getElementById('navDate').value = dateKey(selectedDate);
  document.getElementById('navToday').style.display = isToday ? 'none' : 'inline-block';
  document.getElementById('dayNavLabel').textContent = fmtDate(selectedDate).toUpperCase() + (isToday ? ' · TODAY' : '');
}
document.getElementById('navPrev').addEventListener('click', ()=>{ selectedDate.setDate(selectedDate.getDate()-1); selectedDate=new Date(selectedDate); render(); });
document.getElementById('navNext').addEventListener('click', ()=>{ selectedDate.setDate(selectedDate.getDate()+1); selectedDate=new Date(selectedDate); render(); });
document.getElementById('navToday').addEventListener('click', ()=>{ selectedDate=todayNorm(); render(); });
document.getElementById('navDate').addEventListener('change', (e)=>{
  const parts = e.target.value.split('-');
  selectedDate = new Date(parts[0], parts[1]-1, parts[2]);
  render();
});

// ---------- Activity card ----------
function renderActivityCard(){
  const key = dateKey(selectedDate);
  const card = document.getElementById('activityCard');
  const existing = activities[key];

  if(!existing || formState){
    // Build/edit form
    const draft = formState || (existing ? {type:existing.type, subtype:existing.subtype} : {type:''});
    let html = '<div class="card-title">Log activity</div>';
    html += '<div class="field"><label>Activity type</label><select id="typeSelect">';
    html += '<option value="">Select...</option>';
    Object.keys(TYPE_LABELS).forEach(t=>{
      html += '<option value="'+t+'"'+(draft.type===t?' selected':'')+'>'+TYPE_LABELS[t]+'</option>';
    });
    html += '</select></div>';

    if(draft.type==='bike'){
      html += '<div class="field" style="margin-top:12px;"><label>Session type</label><select id="subtypeSelect">';
      BIKE_SUBTYPES.forEach(s=>{ html += '<option value="'+s.v+'"'+(draft.subtype===s.v?' selected':'')+'>'+s.label+'</option>'; });
      html += '</select></div>';
      html += '<div class="field-grid"><div class="field"><label>Duration (min)</label><input type="number" class="num-input" id="f_duration" value="'+((existing&&existing.durationMin)||'')+'"></div>'+
              '<div class="field"><label>Avg watts</label><input type="number" class="num-input" id="f_watts" value="'+((existing&&existing.watts)||'')+'"></div></div>';
    } else if(draft.type==='swim' || draft.type==='run'){
      const distLabel = draft.type==='swim' ? 'Distance (m)' : 'Distance (km)';
      html += '<div class="field-grid">'+
        '<div class="field"><label>'+distLabel+'</label><input type="number" class="num-input" id="f_distance" value="'+((existing&&existing.distance)||'')+'"></div>'+
        '<div class="field"><label>Duration (min)</label><input type="number" class="num-input" id="f_duration" value="'+((existing&&existing.durationMin)||'')+'"></div>'+
        '<div class="field"><label>Avg heart rate</label><input type="number" class="num-input" id="f_hr" value="'+((existing&&existing.heartRate)||'')+'"></div>'+
        '</div>';
    } else if(draft.type==='gym' || draft.type==='walk'){
      html += '<div class="field" style="margin-top:12px;"><label>Duration (min)</label><input type="number" class="num-input" id="f_duration" value="'+((existing&&existing.durationMin)||'')+'"></div>';
    }
    // rest: no fields

    html += '<div class="btn-row">';
    if(existing){ html += '<button class="btn secondary small" id="cancelEditBtn">Cancel</button>'; }
    html += '<button class="btn" id="saveActivityBtn" style="flex:1;">'+(existing?'Save changes':'Save as planned')+'</button>';
    html += '</div>';

    card.innerHTML = html;

    const typeSelect = document.getElementById('typeSelect');
    typeSelect.addEventListener('change', (e)=>{ formState = {type:e.target.value, subtype: e.target.value==='bike' ? 'vo2' : undefined}; renderActivityCard(); });

    const subtypeSelect = document.getElementById('subtypeSelect');
    if(subtypeSelect) subtypeSelect.addEventListener('change', (e)=>{ formState = Object.assign({}, formState||draft, {subtype:e.target.value}); });

    const cancelBtn = document.getElementById('cancelEditBtn');
    if(cancelBtn) cancelBtn.addEventListener('click', ()=>{ formState=null; renderActivityCard(); });

    document.getElementById('saveActivityBtn').addEventListener('click', async ()=>{
      const type = typeSelect.value;
      if(!type) return;
      const entry = {type, status: (existing&&existing.status) || 'planned'};
      if(type==='bike'){
        entry.subtype = (subtypeSelect && subtypeSelect.value) || 'vo2';
        entry.durationMin = parseFloat(document.getElementById('f_duration').value)||0;
        entry.watts = parseFloat(document.getElementById('f_watts').value)||0;
      } else if(type==='swim' || type==='run'){
        entry.distance = parseFloat(document.getElementById('f_distance').value)||0;
        entry.durationMin = parseFloat(document.getElementById('f_duration').value)||0;
        entry.heartRate = parseFloat(document.getElementById('f_hr').value)||0;
      } else if(type==='gym' || type==='walk'){
        entry.durationMin = parseFloat(document.getElementById('f_duration').value)||0;
      }
      activities[key] = entry;
      formState = null;
      await saveActivities();
      render();
    });
    return;
  }

  // Summary view
  let detailParts = [];
  if(existing.type==='bike'){
    const sub = BIKE_SUBTYPES.find(s=>s.v===existing.subtype);
    detailParts.push(sub ? sub.label : '');
    detailParts.push((existing.durationMin||0)+' min');
    detailParts.push('~'+(existing.watts||0)+'W avg');
  } else if(existing.type==='swim'){
    detailParts.push((existing.distance||0)+'m');
    detailParts.push((existing.durationMin||0)+' min');
    detailParts.push((existing.heartRate||0)+' bpm avg');
  } else if(existing.type==='run'){
    detailParts.push((existing.distance||0)+'km');
    detailParts.push((existing.durationMin||0)+' min');
    detailParts.push((existing.heartRate||0)+' bpm avg');
  } else if(existing.type==='gym' || existing.type==='walk'){
    detailParts.push((existing.durationMin||0)+' min');
  }

  card.innerHTML =
    '<div class="summary-row">'+
      '<div><div class="summary-name">'+TYPE_LABELS[existing.type]+'</div>'+
      '<div class="summary-sub">'+detailParts.filter(Boolean).join(' &middot; ')+'</div></div>'+
      '<div class="badge '+existing.status+'">'+(existing.status==='complete'?'Complete':'Planned')+'</div>'+
    '</div>'+
    '<div class="btn-row">'+
      '<button class="btn secondary" id="editActivityBtn" style="flex:1;">Edit</button>'+
      '<button class="btn" id="toggleCompleteBtn" style="flex:1;">'+(existing.status==='complete'?'Mark as planned':'Mark complete')+'</button>'+
    '</div>'+
    '<button class="btn secondary small" id="clearActivityBtn" style="margin-top:10px;">Clear entry</button>';

  document.getElementById('editActivityBtn').addEventListener('click', ()=>{ formState = {type:existing.type, subtype:existing.subtype}; renderActivityCard(); });
  document.getElementById('toggleCompleteBtn').addEventListener('click', async ()=>{
    existing.status = existing.status==='complete' ? 'planned' : 'complete';
    await saveActivities(); renderActivityCard(); updateStreak();
  });
  document.getElementById('clearActivityBtn').addEventListener('click', async ()=>{
    delete activities[key]; await saveActivities(); render();
  });
}

// ---------- Metrics fields ----------
function renderMetricsFields(){
  const key = dateKey(selectedDate);
  const m = getMetric(key);
  document.getElementById('m_eaten').value = m.eaten ?? '';
  document.getElementById('m_burned').value = m.burned ?? '';
  document.getElementById('m_steps').value = m.steps ?? '';
  document.getElementById('m_sleepscore').value = m.sleepScore ?? '';
  document.getElementById('m_sleepdur').value = m.sleepDuration ?? '';
  document.getElementById('m_weight').value = m.weight ?? '';
}
function bindMetricInput(id, field, isFloat){
  document.getElementById(id).addEventListener('change', async (e)=>{
    const v = e.target.value === '' ? null : (isFloat ? parseFloat(e.target.value) : parseInt(e.target.value,10));
    setMetricField(dateKey(selectedDate), field, v);
    await saveMetrics();
    if(currentTab==='progress') renderProgress();
  });
}
bindMetricInput('m_eaten','eaten',false);
bindMetricInput('m_burned','burned',false);
bindMetricInput('m_steps','steps',false);
bindMetricInput('m_sleepscore','sleepScore',false);
bindMetricInput('m_sleepdur','sleepDuration',true);
bindMetricInput('m_weight','weight',true);

// ---------- Streak ----------
function updateStreak(){
  let streak=0; let cursor=todayNorm();
  while(activities[dateKey(cursor)] && activities[dateKey(cursor)].status==='complete'){
    streak++; cursor.setDate(cursor.getDate()-1);
  }
  document.getElementById('streakVal').textContent = streak;
}

// ---------- Main render ----------
function render(){
  renderDayNav();
  renderActivityCard();
  renderMetricsFields();
  updateStreak();
  if(currentTab==='progress') renderProgress();
}

// ---------- Progress charts ----------
function drawSeries(svgId, labelsId, days, valueFn, color, opts){
  opts = opts || {};
  const W=700, H=opts.height||130;
  const pts = [];
  days.forEach((d,i)=>{
    const v = valueFn(d);
    if(v !== null && v !== undefined && !isNaN(v)) pts.push({i, v});
  });
  const svg = document.getElementById(svgId);
  if(pts.length===0){ svg.innerHTML = '<text x="350" y="'+(H/2)+'" text-anchor="middle" fill="#8B93A1" font-size="13" font-family="IBM Plex Mono, monospace">No data yet</text>'; document.getElementById(labelsId).innerHTML=''; return null; }
  const vals = pts.map(p=>p.v);
  let min = opts.yMin !== undefined ? opts.yMin : Math.min(...vals);
  let max = opts.yMax !== undefined ? opts.yMax : Math.max(...vals);
  if(max===min){ max = min+1; }
  const pad = 14;
  const xFor = i => days.length<=1 ? W/2 : (i/(days.length-1))*W;
  const yFor = v => H-pad - ((v-min)/(max-min))*(H-pad*2);
  const polyPts = pts.map(p=>xFor(p.i)+','+yFor(p.v)).join(' ');
  let svgContent = '<polyline points="'+polyPts+'" fill="none" stroke="'+color+'" stroke-width="2.5"/>';
  pts.forEach(p=>{ svgContent += '<circle cx="'+xFor(p.i)+'" cy="'+yFor(p.v)+'" r="3" fill="'+color+'"/>'; });
  svg.innerHTML += svgContent;
  return {min,max,pts,xFor,yFor};
}

function renderProgress(){
  const days = last30Dates();

  // Calories
  document.getElementById('calChart').innerHTML = '';
  const eatenR = drawSeries('calChart','calChartLabels', days, d=>{ const m=metrics[dateKey(d)]; return m&&m.eaten!=null ? m.eaten : null; }, '#4C8BC9');
  drawSeries('calChart','calChartLabels', days, d=>{ const m=metrics[dateKey(d)]; return m&&m.burned!=null ? m.burned : null; }, '#C8383A');
  const calLabels = document.getElementById('calChartLabels'); calLabels.innerHTML='';
  [0,9,19,29].forEach(i=>{ const s=document.createElement('span'); s.textContent=fmtShort(days[i]); calLabels.appendChild(s); });
  let totalEaten=0, totalBurned=0, count=0;
  days.forEach(d=>{ const m=metrics[dateKey(d)]; if(m&&m.eaten!=null&&m.burned!=null){ totalEaten+=m.eaten; totalBurned+=m.burned; count++; } });
  document.getElementById('calNetStat').innerHTML = count>0
    ? 'Avg net over logged days: <b>'+(count? Math.round((totalEaten-totalBurned)/count):0)+' kcal/day</b> ('+count+' day'+(count===1?'':'s')+' with both logged)'
    : 'Log both calories eaten and burned to see your average net.';

  // Weight
  document.getElementById('weightChart').innerHTML='';
  const wRes = drawSeries('weightChart','weightChartLabels', days, d=>{ const m=metrics[dateKey(d)]; return m&&m.weight!=null ? m.weight : null; }, '#E8A23D');
  const wLabels = document.getElementById('weightChartLabels'); wLabels.innerHTML='';
  [0,9,19,29].forEach(i=>{ const s=document.createElement('span'); s.textContent=fmtShort(days[i]); wLabels.appendChild(s); });
  if(wRes && wRes.pts.length>0){
    const latest = wRes.pts[wRes.pts.length-1].v;
    const first = wRes.pts[0].v;
    const diff = (latest-first).toFixed(1);
    document.getElementById('weightStat').innerHTML = 'Latest: <b>'+latest+'kg</b> &middot; '+(diff>0?'+':'')+diff+'kg over this period';
  } else {
    document.getElementById('weightStat').textContent = 'No weight logged yet.';
  }

  // Hours active (bar chart) - only counts completed activities
  const hoursSvg = document.getElementById('hoursChart');
  const W=700,H=130, n=days.length, gap=W/n, barW=gap*0.6;
  const hourVals = days.map(d=>{
    const a = activities[dateKey(d)];
    if(a && a.status==='complete' && a.durationMin) return a.durationMin/60;
    return 0;
  });
  const maxH = Math.max(...hourVals, 1);
  let hoursSvgContent='';
  hourVals.forEach((v,i)=>{
    const h = (v/maxH)*100;
    const x = i*gap+(gap-barW)/2;
    const y = H-h-14;
    hoursSvgContent += '<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+h+'" rx="2" fill="'+(v>0?'#4C9A6A':'#3A4150')+'"/>';
  });
  hoursSvg.innerHTML = hoursSvgContent;
  const hoursLabels = document.getElementById('hoursChartLabels'); hoursLabels.innerHTML='';
  [0,9,19,29].forEach(i=>{ const s=document.createElement('span'); s.textContent=fmtShort(days[i]); hoursLabels.appendChild(s); });
  const totalHours = hourVals.reduce((a,b)=>a+b,0);
  const activeDays = hourVals.filter(v=>v>0).length;
  document.getElementById('hoursStat').innerHTML = '<b>'+totalHours.toFixed(1)+'h</b> total over last 30 days &middot; active on <b>'+activeDays+'</b> days';

  // Sleep
  document.getElementById('sleepScoreChart').innerHTML='';
  drawSeries('sleepScoreChart','sleepScoreLabels', days, d=>{ const m=metrics[dateKey(d)]; return m&&m.sleepScore!=null ? m.sleepScore : null; }, '#9B7FD4', {height:100, yMin:0, yMax:100});
  const ssLabels = document.getElementById('sleepScoreLabels'); ssLabels.innerHTML='';
  [0,9,19,29].forEach(i=>{ const s=document.createElement('span'); s.textContent=fmtShort(days[i]); ssLabels.appendChild(s); });

  document.getElementById('sleepDurChart').innerHTML='';
  drawSeries('sleepDurChart','sleepDurLabels', days, d=>{ const m=metrics[dateKey(d)]; return m&&m.sleepDuration!=null ? m.sleepDuration : null; }, '#4C8BC9', {height:100});
  const sdLabels = document.getElementById('sleepDurLabels'); sdLabels.innerHTML='';
  [0,9,19,29].forEach(i=>{ const s=document.createElement('span'); s.textContent=fmtShort(days[i]); sdLabels.appendChild(s); });
}

loadData();
</script>
</body>
</html>
